<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom2Universe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 48px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 360px;
        }
        a {
            display: block;
            padding: 16px 24px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.15s, border-color 0.15s;
        }
        a:hover {
            background: #252525;
            border-color: #444;
        }
        a .label {
            font-weight: 600;
            color: #ffffff;
        }
        a .desc {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
        footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Atom2Universe</h1>
    <p class="subtitle">Android audio app — music, MIDI, radio, games</p>

    <div class="links">
        <a href="PRIVACY_POLICY.md">
            <div class="label">Privacy Policy</div>
            <div class="desc">How we handle your data</div>
        </a>
        <a href="TERMS_OF_SERVICE.md">
            <div class="label">Terms of Service</div>
            <div class="desc">Terms and conditions of use</div>
        </a>
        <a href="https://github.com/link2hearth/Atom2Universe">
            <div class="label">GitHub</div>
            <div class="desc">Source code and issue tracker</div>
        </a>
    </div>

    <footer>© 2025 Atom2Universe</footer>
</body>
</html>
